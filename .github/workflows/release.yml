name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout ${{ github.repository }}"
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - uses: ./.github/actions/release-please
        id: release
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}